<script>

const { useState, useMemo, useCallback, useEffect, useRef } = React;

const APP_VERSION = 'v5'; // Superannuation Calculator version

// ════════════════════════════════════════════════════════════════════════════
// SECTION 1 — CONSTANTS & HISTORICAL ACTUALS
// Legislative caps, thresholds, and locked historical data.
// All figures are Australian tax law / Centrelink rules as at FY2026.
// Update annually for indexation changes.
// ════════════════════════════════════════════════════════════════════════════

/**
 * constants.js
 * All financial constants, thresholds, and legislative assumptions.
 * 
 * IMPORTANT: This is a personal modelling tool, not financial advice.
 * All figures are based on Australian tax law and Centrelink rules as at FY2026.
 * Values subject to indexation — update annually.
 */

// ─── SUPERANNUATION ────────────────────────────────────────────────────────────

/** Concessional contributions tax rate (standard) */
const CONTRIB_TAX = 0.15;

/**
 * Effective excess concessional contributions tax rate.
 * = Marginal rate (47%) minus contributions tax already paid (15%) = 32%
 * Applies to concessional contributions above the annual cap.
 */
const EXCESS_TAX = 0.32;

/**
 * Non-concessional contributions (NCC) annual cap: FY2025+ = $120,000
 * Subject to indexation in $10,000 increments.
 */
const NCC_ANNUAL_CAP = 120_000;

/**
 * NCC bring-forward cap: 3 × annual cap = $360,000 over 3 financial years.
 * Triggered when a contribution exceeds the annual cap in one year.
 * Eligibility requires total super balance < $1.9M at 30 June prior year.
 */
const NCC_BRING_FORWARD_CAP = 360_000;
const NCC_BRING_FORWARD_YEARS = 3;

/**
 * Transfer Balance Cap (TBC): FY2026 = $2.1M (indexed from $1.9M → $2.0M → $2.1M)
 * Expected to rise further in FY2027 with CPI indexation.
 * Limits the amount that can be transferred to tax-free pension phase.
 */
const TBC = 2_100_000;

/**
 * Preservation age: 60 (for those born after 1 July 1964)
 * Required to access super as a pension stream (for TTR or retirement).
 */
const PRESERVATION_AGE = 60;

/**
 * Concessional cap schedule (ATO indexed):
 * Returns the concessional cap for a given financial year.
 * @param {number} fy - Financial year (e.g. 2026 = FY ending June 2026)
 * @returns {number}
 */
function getConcessionalCap(fy) {
  if (fy <= 2024) return 27_500;
  if (fy <= 2030) return 32_500;  // $30k FY25, indexed to $32.5k — updated per spec
  return 35_000;
}

/**
 * Forecast concessional contribution amount by age.
 * Reflects expected salary-sacrifice contributions tracking the cap.
 * @param {number} age
 * @returns {number}
 */
function getForecastContrib(age) {
  if (age <= 56) return 32_500;
  if (age <= 59) return 35_000;
  return 37_500;
}

// ─── AGE PENSION (ASSETS TEST ONLY) ────────────────────────────────────────────
/**
 * ASSUMPTION: Assets test only — income test and deeming NOT modelled.
 * This is a deliberate simplification. Full Centrelink assessments require
 * income test, deeming of financial assets, and grandfathering provisions.
 * 
 * Figures: FY2025 rates, couple combined.
 * Source: Services Australia / DSS Pension Rate Table
 */
// Age Pension rates (FY2025, couple combined). Subject to CPI + PLCI indexation twice yearly.
// Source: Services Australia. Update annually. This is NOT hardcoded govt policy — it is
// a reference value the model uses as the income-test ceiling and assets-test full pension.
const AGE_PENSION = {
  /** Full couple pension per year (combined). FY2025: $44,855. */
  coupleFullPensionPA: 44_855,

  /** Age at which Age Pension eligibility begins */
  eligibilityAge: 67,

  /**
   * Assets test thresholds — couple, homeowner
   * Below fullThreshold → full pension
   * Above cutout → nil pension
   * Between → tapered at $3/fortnight per $1,000 above threshold
   */
  couple: {
    homeowner: {
      fullThreshold: 470_000,
      cutout: 1_031_000,
    },
    nonHomeowner: {
      fullThreshold: 722_000,
      cutout: 1_283_000,
    },
  },

  /**
   * Taper rate: $3/fortnight = $78/year per $1,000 assets above lower threshold.
   * Formula: pension = fullPension − ((assets − threshold) / 1000) × 78
   */
  taperPerThousandPA: 78,

  /**
   * Home value: EXCLUDED from assets test (principal residence exemption).
   * Homeowner status determines which threshold set applies.
   * Home value is informational only — it does NOT reduce pension entitlement.
   */
  homeExcludedFromAssetsTest: true,
};

// ─── INFLATION BASE ─────────────────────────────────────────────────────────────
/**
 * Base financial year for inflation-adjusted (real) calculations.
 * FY2026 = current year = base (factor = 1.0).
 */
const INFLATION_BASE_YEAR = 2026;

// ─── AGE / YEAR MAPPING ─────────────────────────────────────────────────────────
/**
 * Rob & Tina are both age 54 in FY2026.
 * Age 48 = FY2020 (first actual data point).
 * @param {number} age
 * @returns {number} Financial year
 */
function ageToFY(age) {
  return 2020 + (age - 48);
}

// ─── HISTORICAL ACTUALS ─────────────────────────────────────────────────────────
/**
 * Locked historical data — ages 48–53 (FY2020–FY2025).
 * 
 * IMPORTANT: robOpenBal / tinaOpenBal are the OPENING balances for each age year.
 * The CLOSING balance of each year = the OPENING balance of the next year.
 * The final row (age 53) closing balance = $829,122.86 (Rob) / $658,880.00 (Tina)
 * These are confirmed FY2025 finals. Age 54 (FY2026) is the first forecast year.
 * 
 * robExcessTaxActual: actual excess concessional tax charged (from member statement)
 */
const ACTUALS = [
  { age:48, robOpenBal:462151.00, tinaOpenBal:335957.00, robContrib:22479.00, tinaContrib:23249.00, robReturn:19.24, tinaReturn:18.10, robExcessTaxActual:0 },
  { age:49, robOpenBal:570166.00, tinaOpenBal:416543.00, robContrib:22876.00, tinaContrib:26669.00, robReturn:18.07, tinaReturn:16.50, robExcessTaxActual:0 },
  { age:50, robOpenBal:567311.00, tinaOpenBal:419005.00, robContrib:24993.00, tinaContrib:26669.00, robReturn:-4.42, tinaReturn:-5.63, robExcessTaxActual:0 },
  { age:51, robOpenBal:652528.00, tinaOpenBal:484791.00, robContrib:27208.00, tinaContrib:26669.00, robReturn:10.39, tinaReturn:9.05,  robExcessTaxActual:0 },
  { age:52, robOpenBal:730025.00, tinaOpenBal:559116.00, robContrib:26551.00, tinaContrib:26669.00, robReturn:7.55,  tinaReturn:9.57,  robExcessTaxActual:0 },
  { age:53, robOpenBal:829122.86, tinaOpenBal:658880.00, robContrib:29608.32, tinaContrib:30000.00, robReturn:9.76,  tinaReturn:12.77, robExcessTaxActual:0 },
  // NOTE: Age 53 closing balances are confirmed FY2025 finals:
  // Rob: $829,122.86 | Tina: $658,880.00
  // These seed the forecast from age 54 (FY2026).
];

/**
 * The confirmed closing balances of the final actual year (age 53 / FY2025).
 * These are the seeds for all forecast calculations.
 * 
 * V3 FIX: In v2, the final actual row used robOpenBal as its closing balance
 * when no next row existed — open ≠ close. This is now explicit and seeds
 * the forecast correctly from confirmed member-statement finals.
 */
const FINAL_ACTUAL_CLOSE = {
  rob:  829_122.86,
  tina: 658_880.00,
  age:  53,
  fy:   2025,
};

// ════════════════════════════════════════════════════════════════════════════
// SECTION 2 — FORMATTING UTILITIES
// Pure formatting helpers: currency, percentages, inflation deflation.
// No financial logic here.
// ════════════════════════════════════════════════════════════════════════════

/**
 * utils/format.js
 * Formatting helpers for currency, percentages, and inflation adjustment.
 */


/**
 * Format a number as Australian dollars.
 * @param {number} n - Amount to format
 * @param {boolean} abs - If true, format absolute value (for delta displays)
 * @returns {string}
 */
function fmt(n, abs = false) {
  const v = abs ? Math.abs(n) : n;
  return v.toLocaleString('en-AU', {
    style: 'currency',
    currency: 'AUD',
    maximumFractionDigits: 0,
  });
}

/**
 * Format a number as $X.XXM (millions shorthand for chart axes).
 * @param {number} n
 * @returns {string}
 */
function fmtM(n) {
  return (n / 1_000_000).toFixed(2) + 'M';
}

/**
 * Format a percentage with sign and 2dp.
 * @param {number|null} n
 * @returns {string}
 */
function fmtPct(n) {
  if (n == null) return '—';
  return `${n >= 0 ? '+' : ''}${n.toFixed(2)}%`;
}

/**
 * Deflate a nominal future value back to base-year (FY2026) real dollars.
 * Uses standard present-value deflation: real = nominal / (1 + r)^years
 * 
 * @param {number} nominal - Nominal (future) dollar value
 * @param {number} fy - Financial year of the nominal value
 * @param {number} inflationRate - Annual CPI rate as percentage (e.g. 2.5)
 * @returns {number} Real value in base-year dollars
 */
function toReal(nominal, fy, inflationRate) {
  const years = fy - INFLATION_BASE_YEAR;
  if (years === 0) return nominal;
  return nominal / Math.pow(1 + inflationRate / 100, years);
}

// ════════════════════════════════════════════════════════════════════════════
// SECTION 3 — PENSION & RETIREMENT TAX ENGINE
// Age Pension estimation (assets test + optional income/deeming test).
// Retirement income tax (pension phase from age 60: tax-free).
// IMPORTANT: assets test only by default; deeming is parameterised by user.
// Neither replicates full Centrelink assessment. Not financial advice.
// ════════════════════════════════════════════════════════════════════════════

/**
 * engine/pension.js
 * Age Pension estimation and retirement income tax modelling.
 *
 * IMPORTANT ASSUMPTIONS (explicitly declared):
 * - Assets test ONLY. Income test and deeming are NOT modelled.
 * - Couple rates used throughout (Rob & Tina as a couple).
 * - Principal residence EXCLUDED from assets test (standard exemption).
 * - Home value is informational only — does NOT affect pension calculation.
 * - Pension phase (age 60+): withdrawals are tax-free under current law.
 * - Pre-preservation components not modelled (all contributions assumed taxed).
 *
 * This is a personal modelling tool, not financial advice.
 */


/**
 * Estimate combined couple Age Pension — ASSETS TEST ONLY.
 *
 * Taper formula (ATO/DSS):
 *   pension = fullPension − max(0, (assets − fullThreshold) / 1000 × taperPA)
 *   where taperPA = $78/year per $1,000 above threshold ($3/fortnight per $1,000).
 *
 * Principal residence is EXCLUDED from assets (standard exemption).
 * Homeowner status determines which threshold set applies (lower for homeowners).
 *
 * LIMITATION: Income test not applied here. Use estimateIncomeTestPension() and
 * take min(assets, income) for a more complete (but still simplified) estimate.
 *
 * @param {number}  totalSuperAssets - Combined super balance (Rob + Tina)
 * @param {number}  otherAssets      - Non-super, non-home assessable assets
 * @param {boolean} isHomeowner      - Homeowner: uses lower asset thresholds
 * @returns {number} Estimated annual couple pension ($)
 */
function estimateAgePension(totalSuperAssets, otherAssets, isHomeowner) {
  // Home is EXCLUDED from assets test — assets = super + other only
  const totalAssets = totalSuperAssets + otherAssets;

  const thresholds = isHomeowner
    ? AGE_PENSION.couple.homeowner
    : AGE_PENSION.couple.nonHomeowner;

  const { fullThreshold, cutout } = thresholds;
  const fullPension = AGE_PENSION.coupleFullPensionPA;

  if (totalAssets <= fullThreshold) return fullPension;
  if (totalAssets >= cutout) return 0;

  const excess = totalAssets - fullThreshold;
  const reduction = (excess / 1000) * AGE_PENSION.taperPerThousandPA;
  return Math.max(0, fullPension - reduction);
}

/**
 * Retirement income tax on a gross super withdrawal.
 *
 * Current Australian law:
 *   - Pension phase (age 60+): ALL withdrawals tax-free (s.301-10 ITAA 1997).
 *   - Pre-preservation (age < 60): taxable component taxed at marginal rate
 *     less a 15% tax offset (standard super benefit treatment).
 *
 * The after-tax toggle is provided for future extensibility. Under current
 * settings (retirement age ≥ 60) tax is always $0 in pension phase.
 *
 * @param {number}  grossDraw             - Gross annual withdrawal ($)
 * @param {number}  age                   - Person's age at withdrawal
 * @param {boolean} showAfterTax          - After-tax toggle state
 * @param {number}  [taxableComponentPct] - Taxable proportion (0–1); 0 = all tax-free
 * @returns {{ tax: number, net: number }}
 */
function calcRetirementTax(grossDraw, age, showAfterTax, taxableComponentPct = 0) {
  if (!showAfterTax) {
    // Toggle OFF: pass through unchanged (v2 default behaviour preserved)
    return { tax: 0, net: grossDraw };
  }

  if (age >= PRESERVATION_AGE) {
    // Pension phase from age 60: ALL withdrawals tax-free
    // (both taxable and tax-free components become tax-free in pension phase)
    return { tax: 0, net: grossDraw };
  }

  // Pre-preservation: simplified marginal rates + 15% offset on taxable component
  // This path is not currently reached in the base model (retirement age >= 60)
  // but is preserved for correctness if preservation age is ever changed.
  const taxableAmount = grossDraw * taxableComponentPct;

  let tax = 0;
  if (taxableAmount > 120_000)       tax = (taxableAmount - 120_000) * 0.37 + (120_000 - 45_000) * 0.325 + (45_000 - 18_200) * 0.19;
  else if (taxableAmount > 45_000)   tax = (taxableAmount - 45_000)  * 0.325 + (45_000 - 18_200) * 0.19;
  else if (taxableAmount > 18_200)   tax = (taxableAmount - 18_200)  * 0.19;

  const offset = Math.min(tax, taxableAmount * 0.15);
  tax = Math.max(0, tax - offset);

  return { tax, net: grossDraw - tax };

 *   B) NCC bring-forward tracking: rolling 3-year window per person.
 *
 * ASSUMPTIONS:

 *   - Concessional contributions taxed at 15% on entry.
 *   - Excess concessional taxed at 32% effective (47% marginal − 15% paid).

// ─── NCC BRING-FORWARD TRACKER ────────────────────────────────────────────────

/**
 * Compute rolling NCC bring-forward usage for one person across all forecast years.
 *
 * Rules (simplified deterministic model):
 *   - In any year where NCC > annual cap, bring-forward is triggered.
 *   - Total NCC across the trigger year + next 2 years must not exceed $360k.
 *   - We track a rolling 3-year window and warn when the cap is exceeded.
 *
 * @param {Array<{age: number, ncc: number}>} nccByAge - NCC amount per age year
 * @returns {Map<number, {annual: number, rolling3yr: number, annualWarn: boolean, bfWarn: boolean}>}
 */
function buildNccBfTracker(nccByAge) {
  const result = new Map();
  for (let i = 0; i < nccByAge.length; i++) {
    const { age, ncc } = nccByAge[i];
    const annual = ncc;
    // Rolling 3-year sum: this year + previous 2 years
    let rolling3yr = 0;
    for (let j = Math.max(0, i - (NCC_BRING_FORWARD_YEARS - 1)); j <= i; j++) {
      rolling3yr += nccByAge[j].ncc;
    }
    result.set(age, {
      annual,
      rolling3yr,
      annualWarn: annual > NCC_ANNUAL_CAP,
      bfWarn: rolling3yr > NCC_BRING_FORWARD_CAP,
    });
  }
  return result;
}

    const tinaCloseBal = nextRow
      ? nextRow.tinaOpenBal
      : FINAL_ACTUAL_CLOSE.tina;  // ← was row.tinaOpenBal in v2 (incorrect)

    const robNetContrib  = row.robContrib  * (1 - CONTRIB_TAX);
    const tinaNetContrib = row.tinaContrib * (1 - CONTRIB_TAX);

    const robExcess    = Math.max(0, row.robContrib  - cap);
    const tinaExcess   = Math.max(0, row.tinaContrib - cap);
    const robExcessTax = row.robExcessTaxActual > 0
      ? row.robExcessTaxActual
      : robExcess * EXCESS_TAX;
    const tinaExcessTax = tinaExcess * EXCESS_TAX;

    // Dollar growth = close − open − net contributions
    // Only meaningful when we have a confirmed return AND a next row
    const robGrowth  = hasReturn && nextRow
      ? robCloseBal  - row.robOpenBal  - robNetContrib
      : null;
    const tinaGrowth = hasReturn && nextRow
      ? tinaCloseBal - row.tinaOpenBal - tinaNetContrib
      : null;

    result.push({
      age: row.age, fy,
      isActual:  hasReturn,
      isCurrent: false,
      isForecast: false,
      isRobRetired: false,
      isTinaRetired: false,
      isTTR: false,
      robOpenBal:  row.robOpenBal,
      tinaOpenBal: row.tinaOpenBal,
      robCloseBal,
      tinaCloseBal,
      robContrib:  row.robContrib,
      tinaContrib: row.tinaContrib,
      robNetContrib,
      tinaNetContrib,
      robNccAnnual:  0,
      tinaNccAnnual: 0,
      robLumpSum:  0,
      tinaLumpSum: 0,
      robReturn:  row.robReturn,
      tinaReturn: row.tinaReturn,
      robGrowth,
      tinaGrowth,
      robExcessTax,
      tinaExcessTax,
      ttrRobIncome:  0,
      ttrTinaIncome: 0,
      ttrIncome: 0,
      // NCC bring-forward tracking (actuals: no forecast NCC)
      robNccBfWarn:  false,
      tinaNccBfWarn: false,
      robNccAnnualWarn:  false,
      tinaNccAnnualWarn: false,
    });
  });

  // ── SECTION 2: Forecast NCC schedule (for bring-forward tracking) ───────────
  // FIX (v3-B): Build the full NCC schedule upfront so we can track rolling sums.
  const robNccSchedule  = [];
  const tinaNccSchedule = [];

  for (let age = 54; age <= maxAge; age++) {
    const robRetired  = age > robRetireAge;
    const tinaRetired = age > tinaRetireAge;
    const robNccActive  = !robRetired  && age >= robNccStartAge;
    const tinaNCCActive = !tinaRetired && age >= tinaNccStartAge;
    const robLump  = (!robRetired  && age === robLumpAge  && robLumpSum  > 0) ? robLumpSum  : 0;
    const tinaLump = (!tinaRetired && age === tinaLumpAge && tinaLumpSum > 0) ? tinaLumpSum : 0;

    robNccSchedule.push({
      age,
      ncc: (robNccActive ? robNccMonth * 12 : 0) + robLump,
    });
    tinaNccSchedule.push({
      age,
      ncc: (tinaNCCActive ? tinaNccMonth * 12 : 0) + tinaLump,
    });
  }

  const robBfTracker  = buildNccBfTracker(robNccSchedule);
  const tinaBfTracker = buildNccBfTracker(tinaNccSchedule);

  // ── SECTION 3: Forecast years (age 54 onwards) ──────────────────────────────
  // Seed from confirmed FY2025 closing balances (FINAL_ACTUAL_CLOSE).
  let robBal  = FINAL_ACTUAL_CLOSE.rob;
  let tinaBal = FINAL_ACTUAL_CLOSE.tina;

  for (let age = 54; age <= maxAge; age++) {
    const fy  = ageToFY(age);
    const cap = getConcessionalCap(fy);

    const robRetired  = age > robRetireAge;
    const tinaRetired = age > tinaRetireAge;

    // TTR (Transition to Retirement): draws a minimum 4% pension from super
    // while still working, and reduces salary-sacrifice contributions by 30%.
    // Only valid between preservation age (60) and full retirement.
    // Net effect: lower balance growth but additional pre-retirement cash flow.
    const robTTR  = useTTR && !robRetired  && age >= ttrRobAge  && age >= PRESERVATION_AGE;
    const tinaTTR = useTTR && !tinaRetired && age >= ttrTinaAge && age >= PRESERVATION_AGE;

    // Concessional contributions (reduced by 30% under TTR strategy)
    let robContrib  = robRetired  ? 0 : getForecastContrib(age);
    let tinaContrib = tinaRetired ? 0 : getForecastContrib(age);
    if (robTTR)  robContrib  = Math.max(0, robContrib  * 0.7);
    if (tinaTTR) tinaContrib = Math.max(0, tinaContrib * 0.7);

    let robNetContrib  = robContrib  * (1 - CONTRIB_TAX);
    let tinaNetContrib = tinaContrib * (1 - CONTRIB_TAX);

    const robExcess    = Math.max(0, robContrib  - cap);
    const tinaExcess   = Math.max(0, tinaContrib - cap);
    let robExcessTax = robExcess  * EXCESS_TAX;
    let tinaExTax    = tinaExcess * EXCESS_TAX;

    // TTR pension draw: 4% minimum pension from TTR account
    const ttrRobIncome  = robTTR  ? robBal  * 0.04 : 0;
    const ttrTinaIncome = tinaTTR ? tinaBal * 0.04 : 0;

    // NCC: monthly + lump sum (sourced from pre-built schedules)
    const robNcc  = robNccSchedule.find(r => r.age === age)?.ncc ?? 0;
    const tinaNcc = tinaNccSchedule.find(r => r.age === age)?.ncc ?? 0;

    // Separate monthly and lump for display
    const robNccMonthly  = !robRetired  && age >= robNccStartAge  ? robNccMonth  * 12 : 0;
    const tinaNccMonthly = !tinaRetired && age >= tinaNccStartAge ? tinaNccMonth * 12 : 0;
    const robLump  = (!robRetired  && age === robLumpAge  && robLumpSum  > 0) ? robLumpSum  : 0;
    const tinaLump = (!tinaRetired && age === tinaLumpAge && tinaLumpSum > 0) ? tinaLumpSum : 0;

    const robOpen  = robBal;
    const tinaOpen = tinaBal;

    // Compound: (open − TTR draw + net CC + NCC) × (1 + return)
    let robClose  = robRetired
      ? robBal
      : (robOpen  - ttrRobIncome  + robNetContrib  + robNcc)  * (1 + robRate  / 100);
    let tinaClose = tinaRetired
      ? tinaBal
      : (tinaOpen - ttrTinaIncome + tinaNetContrib + tinaNcc) * (1 + tinaRate / 100);

    let robGrowth  = robRetired  ? null : robClose  - robOpen  + ttrRobIncome  - robNetContrib  - robNcc;
    let tinaGrowth = tinaRetired ? null : tinaClose - tinaOpen + ttrTinaIncome - tinaNetContrib - tinaNcc;

    // ── Actual Overrides ──────────────────────────────────────────────────────
    // User-entered confirmed values from member statements override the forecast.
    // Close balances are authoritative; contributions/returns are optional.
    // Override rows are marked isActual=true so they display as ACTUAL not FORECAST.
    const ov = overrides[String(age)];
    let isOverride = false;
    let ovRobReturn = null, ovTinaReturn = null;
    if (ov) {
      isOverride = true;
      // Step 1: Override close balances (authoritative — at least one required)
      if (ov.robCloseBal  != null) robClose  = ov.robCloseBal;
      if (ov.tinaCloseBal != null) tinaClose = ov.tinaCloseBal;
      // Step 2: Override contributions — recompute derived values so display is consistent
      if (ov.robContrib != null) {
        robContrib    = ov.robContrib;
        robNetContrib = robContrib * (1 - CONTRIB_TAX);
        const ovRobExcess   = Math.max(0, robContrib - cap);
        robExcessTax        = ovRobExcess * EXCESS_TAX;
      }
      if (ov.tinaContrib != null) {
        tinaContrib    = ov.tinaContrib;
        tinaNetContrib = tinaContrib * (1 - CONTRIB_TAX);
        const ovTinaExcess  = Math.max(0, tinaContrib - cap);
        tinaExTax            = ovTinaExcess * EXCESS_TAX;
      }
      // Step 3: Recompute growth using (possibly updated) close balances + net contribs
      robGrowth  = robRetired  ? null : robClose  - robOpen  + ttrRobIncome  - robNetContrib  - robNcc;
      tinaGrowth = tinaRetired ? null : tinaClose - tinaOpen + ttrTinaIncome - tinaNetContrib - tinaNcc;
      // Step 4: Override returns (display only — close balance is authoritative)
      if (ov.robReturn   != null) ovRobReturn  = ov.robReturn;
      if (ov.tinaReturn  != null) ovTinaReturn = ov.tinaReturn;
    }

    // NCC bring-forward warnings (v3-B)
    const robBf  = robBfTracker.get(age)  ?? {};
    const tinaBf = tinaBfTracker.get(age) ?? {};

    result.push({
      age, fy,
      isActual:   isOverride,   // overrides are treated as confirmed actuals
      isOverride,
      isCurrent:  !isOverride && age === 54,
      isForecast: !isOverride,
      isRobRetired:  robRetired,
      isTinaRetired: tinaRetired,
      isTTR: robTTR || tinaTTR,
      robOpenBal:  robOpen,
      tinaOpenBal: tinaOpen,
      robCloseBal:  robRetired  ? null : robClose,
      tinaCloseBal: tinaRetired ? null : tinaClose,
      robContrib,
      tinaContrib,
      robNetContrib,
      tinaNetContrib,
      robNccAnnual:  robNccMonthly,
      tinaNccAnnual: tinaNccMonthly,
      robLumpSum:  robLump,
      tinaLumpSum: tinaLump,
      robReturn:  isOverride && ovRobReturn  != null ? ovRobReturn  : (robRetired  ? null : robRate),
      tinaReturn: isOverride && ovTinaReturn != null ? ovTinaReturn : (tinaRetired ? null : tinaRate),
      robGrowth,
      tinaGrowth,
      robExcessTax,
      tinaExcessTax: tinaExTax,
      ttrRobIncome,
      ttrTinaIncome,
      ttrIncome: ttrRobIncome + ttrTinaIncome,
      // NCC bring-forward tracking
      robNccAnnualWarn:   robBf.annualWarn  ?? false,
      robNccBfWarn:       robBf.bfWarn      ?? false,
      robNccRolling3yr:   robBf.rolling3yr  ?? 0,
      tinaNccAnnualWarn:  tinaBf.annualWarn ?? false,
      tinaNccBfWarn:      tinaBf.bfWarn     ?? false,
      tinaNccRolling3yr:  tinaBf.rolling3yr ?? 0,
    });

    // Advance seed: override closes propagate into next year's opening balance
    robBal  = robRetired  ? robBal  : robClose;
    tinaBal = tinaRetired ? tinaBal : tinaClose;
  }

  return result;
}

// SECTION 5 — DRAWDOWN & STRESS ENGINE
// Retirement drawdown model with:
//   - Phased spending (Golden/Silver/Legacy thirds)
//   - Gap-year funding rules (before both retire)
//   - Age Pension offset (assets test ∩ optional income test)
//   - Deterministic stress scenarios (poor/base/strong)
//   - Monte Carlo stochastic simulation (mulberry32 PRNG, Box-Muller)
// ASSUMPTION: returns are applied before drawdown each year.
// ════════════════════════════════════════════════════════════════════════════

/**
 * engine/drawdown.js
 * Retirement drawdown modelling including stress testing.
 *
 * ASSUMPTIONS:
 *   - Drawdown begins at the FIRST (earliest) retirement age.
 *   - During the gap (only one retired): 100% of draw from the retired person's fund.
 *   - Once both are retired: draw split by drawdownSplit %.
 *   - Age Pension (if enabled) offsets required super drawdown from age 67.
 *   - Balance earns a return each year before drawdown is applied.
 *   - All values nominal; inflation adjustment applied in UI only.
 *   - No drawdown from a fund that has already reached zero.
 *   - Stress sequences are deterministic (no Monte Carlo / RNG).
 */




// ─── STRESS RETURN SEQUENCES ──────────────────────────────────────────────────

/**
 * Deterministic stress return sequences — no randomness.
 *
 * Rationale: sequence-of-returns risk is the dominant retirement risk.
 * A poor early sequence permanently depletes the portfolio because there is
 * less capital compounding in later recovery years. These scenarios model
 * that effect without the noise of Monte Carlo.
 *
 * Sequences:
 *   base:   constant baseRate% throughout
 *   poor:   years 1–5 = max(2%, base−5%) → years 6+: base+1%
 *           Simulates a market downturn at the worst possible time.
 *   strong: years 1–5 = base+4%         → years 6+: max(2%, base−1%)
 *           Simulates a lucky early run; the upper-bound scenario.
 *
 * @param {number} baseRate  - Base retirement return (% p.a.)
 * @param {'base'|'poor'|'strong'} scenario
 * @param {number} yearIndex - 0-indexed year from drawdown start
 */
function getStressReturnRate(baseRate, scenario, yearIndex) {
  if (scenario === 'base') return baseRate;
  if (scenario === 'poor') {
    return yearIndex < 5
      ? Math.max(2, baseRate - 5)
      : baseRate + 1;
  }
  if (scenario === 'strong') {
    return yearIndex < 5
      ? baseRate + 4
      : Math.max(2, baseRate - 1);
  }
  return baseRate;
}

// ─── DRAWDOWN BUILDER ─────────────────────────────────────────────────────────

/**
 * Build the year-by-year retirement drawdown schedule.
 *
 * @param {Array} accumRows  - Output of buildAccumRows()
 * @param {object} params
 * @param {number}  params.drawdownTotal    - Annual gross spend target ($)
 * @param {number}  params.drawdownSplit    - Rob's share of drawdown (0–100%)
 * @param {number}  params.retireReturn     - Return rate in retirement (%)
 * @param {boolean} params.showAfterTax     - Whether after-tax toggle is ON
 * @param {boolean} params.useAgePension    - Whether Age Pension is modelled
 * @param {boolean} params.isHomeowner      - For Age Pension assets test
 * @param {number}  params.otherAssets      - Non-super assessable assets ($)
 * @param {number}  params.robRetireAge     - Rob's retirement age (for context)
 * @param {number}  params.tinaRetireAge    - Tina's retirement age
 * @param {'base'|'poor'|'strong'} [params.scenario='base']
 * @returns {Array<DrawRow>}
 */

// ── Phased spending helpers ────────────────────────────────────────────────
//
// Retirement horizon = 41 years (age 0..40, inclusive).
// Split into three equal thirds (~14 years each):
//   Golden (i 0–13):  peak retirement activity — typically higher spend
//   Silver (i 14–27): moderate activity — mid spend
//   Legacy (i 28–40): later years — lower discretionary spend
//
// When usePhasedSpend=false, stagedSpend() returns drawdownTotal (backward compat).
const DRAWDOWN_HORIZON_YEARS = 41;
function thirdSize() { return Math.ceil(DRAWDOWN_HORIZON_YEARS / 3); }
function stageIndex(i) {
  const t = thirdSize();
  if (i < t)     return 0;
  if (i < t * 2) return 1;
  return 2;
}
function stagedSpend(i, params) {
  if (!params.usePhasedSpend) return params.drawdownTotal;
  const s = stageIndex(i);
  return s === 0 ? params.spendGolden : s === 1 ? params.spendSilver : params.spendLegacy;
}
// ── End phased spending helpers ────────────────────────────────────────────

/**
 * Build the year-by-year retirement drawdown schedule.
 *
 * Key mechanics:
 *   1. Starts at FIRST retirement age (min of Rob/Tina).
 *   2. Gap years (only one retired): draw from retired spouse's fund per
 *      gapFundingRule. Still-working spouse balance sourced from accumRows.
 *   3. Both retired: draw split by drawdownSplit%.
 *   4. Age Pension offset: reduces required super draw from age 67.
 *      Final pension = min(assets test, income test) when both enabled.
 *   5. Phased spending: gross spend varies by Golden/Silver/Legacy thirds.
 *   6. Return applied BEFORE drawdown each year:
 *      endBal = startBal × (1 + return) − draw
 *
 * Stress scenarios use getStressReturnRate() to substitute year-specific
 * returns without changing any other logic.
 */
function buildDrawRows(accumRows, params) {
  const {
    drawdownTotal, drawdownSplit, retireReturn,
    showAfterTax = false,
    useAgePension = false,
    isHomeowner = true,
    otherAssets = 0,
    robRetireAge,
    tinaRetireAge,
    scenario = 'base',
    gapFundingRule = 'retired',
    gapCustomPct   = 50,
    useIncomeTest = false,
    deemingThreshold = 106000,
    deemingRateLow = 0.25,
    deemingRateHigh = 2.25,
    incomeTestFreeArea = 10360,
    incomeTestTaperRate = 0.50,
    deemedAssetsPct = 100,
    usePhasedSpend = false,
    spendGolden = 200000, spendSilver = 200000, spendLegacy = 200000,
  } = params;

  // Batch 3: drawdown starts at FIRST retirement age (min), not max.
  const startAge = Math.min(robRetireAge, tinaRetireAge);

  // Seed balances from the accumulation row at startAge.
  // For the still-working spouse during the gap, we read their balance from
  // accumRows each year so they continue accumulating undisturbed.
  const seedRow = accumRows.find(r => r.age === startAge) || accumRows[accumRows.length - 1];
  let robBal  = (seedRow.robCloseBal  != null ? seedRow.robCloseBal  : seedRow.robOpenBal)  || 0;
  let tinaBal = (seedRow.tinaCloseBal != null ? seedRow.tinaCloseBal : seedRow.tinaOpenBal) || 0;

  const result = [];

  for (let i = 0; i <= 40; i++) {
    const age = startAge + i;
    const fy  = ageToFY(age);

    // Retirement status at this age
    const robRetiredNow  = age >= robRetireAge;
    const tinaRetiredNow = age >= tinaRetireAge;

    // For the still-working spouse, override their balance from accumRows
    // so they keep accumulating rather than being drawn down.
    if (!robRetiredNow) {
      const ar = accumRows.find(r => r.age === age);
      if (ar) robBal = (ar.robCloseBal != null ? ar.robCloseBal : ar.robOpenBal) || 0;
    }
    if (!tinaRetiredNow) {
      const ar = accumRows.find(r => r.age === age);
      if (ar) tinaBal = (ar.tinaCloseBal != null ? ar.tinaCloseBal : ar.tinaOpenBal) || 0;
    }

    const totalBal = Math.max(0, robBal) + Math.max(0, tinaBal);
    // V4.2: correct pension calc — assets test intersect income test
    const financialAssetsDeemed = (totalBal + otherAssets) * (deemedAssetsPct / 100);
    const pensionAssets = (useAgePension && age >= AGE_PENSION.eligibilityAge)
      ? estimateAgePension(totalBal, otherAssets, isHomeowner) : 0;
    const pensionIncome = (useAgePension && useIncomeTest && age >= AGE_PENSION.eligibilityAge)
      ? estimateIncomeTestPension(financialAssetsDeemed, AGE_PENSION.coupleFullPensionPA,
          deemingThreshold, deemingRateLow, deemingRateHigh, incomeTestFreeArea, incomeTestTaperRate)
      : AGE_PENSION.coupleFullPensionPA;
    const pension = useAgePension ? Math.min(pensionAssets, pensionIncome) : 0;
    // V4.2: phased spend
    const grossSpend = stagedSpend(i, params);
    const netSuperDrawTotal = Math.max(0, grossSpend - pension);

    let robNetDraw, tinaNetDraw;
    if (robRetiredNow && !tinaRetiredNow) {
      const robGapPct = (gapFundingRule==='retired'||gapFundingRule==='full') ? 100
        : gapFundingRule==='custom' ? gapCustomPct : drawdownSplit;
      robNetDraw  = netSuperDrawTotal * (robGapPct / 100); tinaNetDraw = 0;
    } else if (!robRetiredNow && tinaRetiredNow) {
      const tinaGapPct = (gapFundingRule==='retired'||gapFundingRule==='full') ? 100
        : gapFundingRule==='custom' ? (100-gapCustomPct) : (100-drawdownSplit);
      robNetDraw  = 0; tinaNetDraw = netSuperDrawTotal * (tinaGapPct / 100);
    } else {
      robNetDraw  = netSuperDrawTotal * (drawdownSplit / 100);
      tinaNetDraw = netSuperDrawTotal * (1 - drawdownSplit / 100);
    }

    // After-tax (pension phase from 60: tax = $0)
    const { tax: robTax,  net: robNetIncome  } = calcRetirementTax(robNetDraw,  age, showAfterTax);
    const { tax: tinaTax, net: tinaNetIncome } = calcRetirementTax(tinaNetDraw, age, showAfterTax);

    result.push({
      age, fy,
      robBal:  Math.max(0, robBal),
      tinaBal: Math.max(0, tinaBal),
      robRetiredNow,
      tinaRetiredNow,
      robDraw:  robNetDraw,
      tinaDraw: tinaNetDraw,
      robTax,
      tinaTax,
      robNetIncome,
      tinaNetIncome,
      pension,
      grossDraw: grossSpend,
      netDraw:   robNetIncome + tinaNetIncome + pension,
    });

    // Stop if both funds exhausted (only meaningful once both are retired)
    if (robRetiredNow && tinaRetiredNow && robBal <= 0 && tinaBal <= 0) break;

    // Advance balances for next iteration.
    // Still-working spouse: balance will be overridden from accumRows above.
    // Retired spouse: apply return then subtract their draw.
    const retRate = getStressReturnRate(retireReturn, scenario, i) / 100;
    if (robRetiredNow)  robBal  = Math.max(0, robBal)  * (1 + retRate) - robNetDraw;
    if (tinaRetiredNow) tinaBal = Math.max(0, tinaBal) * (1 + retRate) - tinaNetDraw;
  }

  return result;
}

/**
 * Build all three stress scenario drawdown tables in one call.
 *
 * @param {Array} accumRows
 * @param {object} params - Same as buildDrawRows params
 * @returns {{ base: Array, poor: Array, strong: Array }}
 */
function buildStressRows(accumRows, params) {
  return {
    base:   buildDrawRows(accumRows, { ...params, scenario: 'base'   }),
    poor:   buildDrawRows(accumRows, { ...params, scenario: 'poor'   }),
    strong: buildDrawRows(accumRows, { ...params, scenario: 'strong' }),
  };
}

/**
 * Compute key drawdown statistics from a drawdown row array.
 *
 * @param {Array} drawRows
 * @param {number} retireStartAge - Age drawdown begins
 * @returns {{ exhausted: DrawRow|null, yearsLast: number|string, startAge: number }}
 */
function calcDrawdownStats(drawRows, retireStartAge) {
  const exhausted = drawRows.find(r => r.robBal <= 0 && r.tinaBal <= 0) || null;
  const yearsLast = exhausted
    ? exhausted.age - retireStartAge
    : '>40';
  return {
    exhausted,
    yearsLast,
    startAge: retireStartAge,
  };
}

/**
 * components/GrowthChart.jsx
 * SVG line chart showing accumulation and drawdown phases.
 * Supports inflation adjustment (real vs nominal) and stress fan overlay.
 */




// ════════════════════════════════════════════════════════════════════════════
// SECTION 6 — UI COMPONENTS
// Pure React components. All financial logic is in Sections 3-5.
// Components receive pre-computed data as props; they do not recalculate.
// ════════════════════════════════════════════════════════════════════════════

function GrowthChart({
  accumRows, drawRows, stressRows,
  robRetireAge, tinaRetireAge,
  inflationRate, showReal, showStress,
}) {
  const W = 900, H = 370, PL = 76, PR = 40, PT = 24, PB = 44;
  const IW = W - PL - PR, IH = H - PT - PB;
  const [hover, setHover] = useState(null);

  const d = (v, fy) => showReal ? toReal(v, fy, inflationRate) : v;

  const accumPts = accumRows.map(r => {
    const rv = r.robCloseBal  != null ? r.robCloseBal  : (r.robOpenBal  || 0);
    const tv = r.tinaCloseBal != null ? r.tinaCloseBal : (r.tinaOpenBal || 0);
    return { age: r.age, fy: r.fy, rob: d(rv, r.fy), tina: d(tv, r.fy), combined: d(rv + tv, r.fy), isDrawdown: false };
  });

  const mkDrawPts = (rows) => (rows || []).map(r => ({
    age: r.age, fy: r.fy,
    rob:      d(r.robBal,           r.fy),
    tina:     d(r.tinaBal,          r.fy),
    combined: d(r.robBal + r.tinaBal, r.fy),
    isDrawdown: true,
  }));

  const drawPts   = mkDrawPts(drawRows);
  const poorPts   = showStress ? mkDrawPts(stressRows?.poor)   : [];
  const strongPts = showStress ? mkDrawPts(stressRows?.strong) : [];

  const allPts = [
    ...accumPts,
    ...drawPts.filter(p => p.age > accumPts[accumPts.length - 1].age),
  ];

  const tbcD = showReal
    ? toReal(TBC, ageToFY(Math.max(robRetireAge, tinaRetireAge)), inflationRate)
    : TBC;

  const allVals = allPts.flatMap(p => [p.rob, p.tina, p.combined]);
  if (showStress) {
    poorPts.forEach(p   => allVals.push(p.combined));
    strongPts.forEach(p => allVals.push(p.combined));
  }
  const maxVal = Math.max(...allVals, tbcD) * 1.08;

function ScenarioManager({ params, onLoad, saveOverrides }) {

  const [importError, setImportError] = useState('');

  const persist = (updated) => {

  const save = () => {
    const name = newName.trim() || `Scenario ${Object.keys(saved).length + 1}`;
    persist({ ...saved, [name]: { ...params, savedAt: new Date().toLocaleDateString('en-AU') } });
    setNewName('');

  const del = (name) => {
    const updated = { ...saved };

    const blob = new Blob([JSON.stringify(saved, null, 2)], { type: 'application/json' });

    const a    = document.createElement('a');
    a.href     = url;
    a.download = `super-scenarios-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // JSON import: parse pasted JSON and merge into saved scenarios
  const importJSON = () => {
    setImportError('');
    try {
      const parsed = JSON.parse(importText);
      if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('Expected a JSON object');

      setImportText('');

// MONTE CARLO SIMULATION
//
// Uses a deterministic PRNG (mulberry32) seeded by the user for repeatability.
// Returns are drawn from Normal(mean, stdev) via Box-Muller transform, then
// clamped to [−25%, +25%] to prevent absurd outcomes.
//
// KEY DESIGN CHOICE: MC is display-only. It does NOT feed back into
// the deterministic accumulation or drawdown projections shown in the table
// and chart. The base-case chart always shows deterministic output.
//
// Results: probability of exhaustion by age 90/95, and p10/p50/p90 balance
// fan at age 90. These are ensemble statistics across all trials.
// ════════════════════════════════════════════════════════════════════════════
// Deterministic PRNG (mulberry32) for repeatability from a user seed.
/**
 * mulberry32 — fast deterministic PRNG.
 * Returns a function that generates uniform [0, 1) values.
 * Same seed always produces the same sequence — essential for reproducibility.
 * @param {number} seed - Integer seed
 */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Box-Muller: produce standard normal from two uniforms
/**
 * Box-Muller transform: convert two uniform [0,1) values to a standard normal.
 * Multiplied by stdev and shifted by mean to get N(mean, stdev) in caller.
 */
function boxMuller(rand) {
  const u1 = Math.max(1e-10, rand()); // guard against log(0)
  const u2 = rand();
  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
}

// Run a single MC trial; returns array of combined balances by year index
function runMCTrial(startRobBal, startTinaBal, params, rand) {
  const { drawdownSplit, mcMean, mcVol, robRetireAge, tinaRetireAge, retireStartAge,
    useAgePension, otherAssets, isHomeowner, useIncomeTest,
    deemingThreshold, deemingRateLow, deemingRateHigh, incomeTestFreeArea, incomeTestTaperRate,
    deemedAssetsPct=100, gapFundingRule='retired', gapCustomPct=50 } = params;
  let robBal = startRobBal, tinaBal = startTinaBal;
  const balances = [];
  for (let i = 0; i <= 40; i++) {
    const age = retireStartAge + i;
    const robRetiredNow  = age >= robRetireAge;
    const tinaRetiredNow = age >= tinaRetireAge;
    const totalBal = Math.max(0, robBal) + Math.max(0, tinaBal);
    const financialAssetsDeemed = (totalBal + otherAssets) * (deemedAssetsPct / 100);
    const pensionA = (useAgePension && age >= AGE_PENSION.eligibilityAge)
      ? estimateAgePension(totalBal, otherAssets, isHomeowner) : 0;
    const pensionI = (useAgePension && useIncomeTest && age >= AGE_PENSION.eligibilityAge)
      ? estimateIncomeTestPension(financialAssetsDeemed, AGE_PENSION.coupleFullPensionPA,
          deemingThreshold, deemingRateLow, deemingRateHigh, incomeTestFreeArea, incomeTestTaperRate)
      : AGE_PENSION.coupleFullPensionPA;
    const pension = useAgePension ? Math.min(pensionA, pensionI) : 0;
    const grossSpend = stagedSpend(i, params);
    const netDraw = Math.max(0, grossSpend - pension);
    let robDraw, tinaDraw;
    if (robRetiredNow && !tinaRetiredNow) {
      const rg=(gapFundingRule==='retired'||gapFundingRule==='full')?100:gapFundingRule==='custom'?gapCustomPct:drawdownSplit;
      robDraw=netDraw*(rg/100); tinaDraw=0;
    } else if (!robRetiredNow && tinaRetiredNow) {
      const tg=(gapFundingRule==='retired'||gapFundingRule==='full')?100:gapFundingRule==='custom'?(100-gapCustomPct):(100-drawdownSplit);
      robDraw=0; tinaDraw=netDraw*(tg/100);
    } else {
      robDraw=netDraw*(drawdownSplit/100); tinaDraw=netDraw*(1-drawdownSplit/100);
    }
    balances.push({ age, combined: Math.max(0, robBal) + Math.max(0, tinaBal) });
    if (robRetiredNow && tinaRetiredNow && robBal <= 0 && tinaBal <= 0) break;
    // Stochastic return — clamped to [-25%, +25%]
    const z = boxMuller(rand);
    const ret = Math.max(-25, Math.min(25, mcMean + z * mcVol)) / 100;
    if (robRetiredNow)  robBal  = Math.max(0, robBal)  * (1 + ret) - robDraw;
    if (tinaRetiredNow) tinaBal = Math.max(0, tinaBal) * (1 + ret) - tinaDraw;
  }
  return balances;
}

function pct(arr, p) {
  const s = [...arr].sort((a,b)=>a-b);
  const i = (p/100)*(s.length-1);
  const lo = Math.floor(i), hi = Math.ceil(i);
  return s[lo] + (s[hi]-s[lo])*(i-lo);
}
